<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>穿刺針 刺入角 自動測定アプリ</title>

  <style>
    :root {
      --primary: #1f6feb;
      --warning: #f59e0b;
      --danger: #dc2626;
      --ok: #22c55e;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Yu Gothic", "Meiryo", sans-serif;
      overscroll-behavior: none;
      touch-action: none;
    }

    html:fullscreen,
    body:fullscreen,
    #appShell:fullscreen {
      width: 100vw;
      height: 100dvh;
      background: #000;
    }

    body {
      display: block;
    }

    #appShell {
      position: relative;
      width: 100vw;
      height: 100dvh;
      background: #000;
      overflow: hidden;
    }

    #container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    video {
      z-index: 1;
      object-fit: fill;
      background: #000;
    }

    canvas {
      z-index: 2;
      cursor: crosshair;
      touch-action: none;
    }

    .topOverlay {
      position: absolute;
      z-index: 5;
      top: max(6px, env(safe-area-inset-top));
      left: max(8px, env(safe-area-inset-left));
      right: max(8px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      background: transparent;
    }

    .buttonRow {
      display: flex;
      gap: 8px;
      justify-content: flex-start;
      align-items: center;
      flex: 0 0 auto;
      flex-wrap: nowrap;
    }

    button {
      min-width: 58px;
      min-height: 58px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 6px 4px 4px;
      background: rgba(17, 24, 39, 0.74);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #pauseBtn { background: rgba(245, 158, 11, 0.88); }
    #stopBtn { background: rgba(220, 38, 38, 0.88); }
    #fullscreenBtn { background: rgba(55, 65, 81, 0.88); }

    .btnIcon {
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
    }

    .btnText {
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .sliderBox {
      height: 58px;
      min-width: 190px;
      max-width: 300px;
      flex: 1 1 220px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: clamp(10px, 1.5vw, 12px);
      font-weight: 800;
      padding: 0 10px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .sliderLabel {
      white-space: nowrap;
      line-height: 1;
    }

    #frameSlider {
      width: 100%;
      height: 26px;
      cursor: pointer;
    }

    #frameSlider:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .depthBox {
      height: 58px;
      min-width: 300px;
      flex: 1.15 1 320px;
      display: grid;
      grid-template-columns: auto minmax(58px, 76px) auto minmax(130px, 1fr);
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: clamp(10px, 1.5vw, 12px);
      font-weight: 800;
      padding: 0 10px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    #depthInput {
      width: 100%;
      min-height: 34px;
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 9px;
      padding: 3px 8px;
      background: rgba(255,255,255,0.92);
      color: #111827;
      font-size: clamp(14px, 2vw, 17px);
      font-weight: 900;
      text-align: center;
    }

    #reachPreview {
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #infoPanel {
      position: absolute;
      z-index: 4;
      left: 0;
      right: 0;
      bottom: 0;
      height: clamp(58px, 12.5dvh, 86px);
      display: grid;
      grid-template-columns: minmax(190px, 1fr) minmax(260px, 1.15fr) minmax(250px, 1fr);
      grid-template-areas:
        "angle reach status"
        "frame reach skin";
      column-gap: 18px;
      row-gap: 4px;
      align-items: center;
      padding: 8px max(16px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      border-radius: 0;
      background: rgba(0, 0, 0, 0.88);
      color: #fff;
      text-align: left;
      pointer-events: none;
    }

    #angleWrap {
      grid-area: angle;
      align-self: end;
      font-size: clamp(14px, 2.1vw, 19px);
      font-weight: 900;
      white-space: nowrap;
      line-height: 1.05;
    }

    #angle {
      color: #ffffff;
      font-size: clamp(24px, 4.3vw, 40px);
      letter-spacing: -0.03em;
    }

    #status {
      grid-area: status;
      align-self: end;
      font-size: clamp(14px, 2.1vw, 19px);
      font-weight: 900;
      line-height: 1.1;
      text-align: right;
      white-space: nowrap;
    }

    #frameInfo {
      grid-area: frame;
      align-self: start;
      text-align: left;
    }

    #reachInfo {
      grid-area: reach;
      color: #ffffff;
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 900;
      line-height: 1.2;
      text-align: center;
      align-self: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #skinInfo {
      grid-area: skin;
      align-self: start;
      text-align: right;
      white-space: nowrap;
    }

    #frameInfo,
    #skinInfo,
    #orientationHint {
      color: rgba(255,255,255,0.78);
      font-size: clamp(10px, 1.6vw, 13px);
      line-height: 1.15;
    }

    #orientationHint {
      display: none;
    }

    .ok { color: #4ade80; }
    .warn { color: #ff6b6b; }
    .paused { color: #fbbf24; }

    details.note {
      display: none;
    }

    @media (orientation: portrait), (max-width: 900px) {
      .topOverlay {
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 6px;
      }

      .buttonRow {
        gap: 6px;
      }

      button {
        min-width: 52px;
        min-height: 52px;
      }

      .sliderBox {
        height: 52px;
        min-width: 170px;
        flex: 1 1 180px;
      }

      .depthBox {
        height: 52px;
        min-width: 250px;
        flex: 1 1 260px;
      }

      @media (orientation: portrait) {
        #infoPanel {
          height: auto;
          min-height: 96px;
          grid-template-columns: 1fr;
          grid-template-areas:
            "angle"
            "status"
            "reach"
            "frame"
            "skin";
          text-align: center;
        }

        #status,
        #skinInfo,
        #frameInfo {
          text-align: center;
        }
      }
    }
  </style>
</head>

<body>
  <div id="appShell">
    <div id="container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="960" height="540"></canvas>

      <div class="topOverlay">
        <div class="buttonRow">
          <button type="button" onclick="startCamera()" aria-label="カメラ開始"><span class="btnIcon">📷</span><span class="btnText">開始</span></button>
          <button type="button" id="pauseBtn" onclick="togglePause()" aria-label="一時停止"><span class="btnIcon">⏸</span><span class="btnText">停止</span></button>
          <button type="button" id="stopBtn" onclick="stopCamera()" aria-label="終了"><span class="btnIcon">■</span><span class="btnText">終了</span></button>
          <button type="button" id="fullscreenBtn" onclick="toggleFullscreen()" aria-label="全画面"><span class="btnIcon">⛶</span><span class="btnText">全画面</span></button>
        </div>

        <div class="sliderBox">
          <div class="sliderLabel">確認</div>
          <input
            type="range"
            id="frameSlider"
            min="0"
            max="0"
            value="0"
            step="1"
            disabled
            oninput="onSliderMove()"
          />
        </div>

        <div class="depthBox">
          <label for="depthInput">深さ</label>
          <input
            type="number"
            id="depthInput"
            inputmode="decimal"
            min="0"
            step="0.1"
            placeholder="mm"
            oninput="updateReachDisplay(lastAngleValue)"
          />
          <span>mm</span>
          <span id="reachPreview">推定到達距離：--.- mm</span>
        </div>
      </div>

      <div id="infoPanel">
        <div id="angleWrap">刺入角：<span id="angle">--.-°</span></div>
        <div id="status">OpenCV.js読み込み中</div>
        <div id="reachInfo">推定到達距離：深さを入力してください</div>
        <div id="orientationHint">カメラ開始時に横画面ロックを試行します</div>
        <div id="frameInfo">保存フレーム：0 / 150</div>
        <div id="skinInfo">皮膚基準線：未設定</div>
      </div>
    </div>
  </div>

  <details class="note">
    <summary>使い方・設定</summary>
    血管深さをmmで入力すると、現在の刺入角から針先が血管深さに到達するまでの推定進行距離を計算します。計算式は「推定到達距離 = 血管深さ ÷ sin(刺入角)」です。
  </details>

  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    const angleText = document.getElementById("angle");
    const statusText = document.getElementById("status");
    const frameInfo = document.getElementById("frameInfo");
    const skinInfo = document.getElementById("skinInfo");
    const orientationHint = document.getElementById("orientationHint");
    const reachInfo = document.getElementById("reachInfo");
    const depthInput = document.getElementById("depthInput");
    const reachPreview = document.getElementById("reachPreview");
    const pauseBtn = document.getElementById("pauseBtn");
    const frameSlider = document.getElementById("frameSlider");

    let stream = null;
    let processing = false;
    let paused = false;
    let cvReady = false;
    let animationId = null;
    let frameCount = 0;
    let lastBestLine = null;
    let lastAngleValue = null;
    let lastStatusValue = "";
    let lastStatusClassValue = "";

    // 背面カメラ使用を前提に左右反転補正は行わない。
    const mirrorFix = false;

    // スマホ用に軽量化。重い場合は 100、余裕があれば 300 程度まで可。
    const maxBufferFrames = 150;
    let frameBuffer = [];
    let reviewIndex = -1;

    // 内部処理解像度。表示はCSSでスマホ幅に自動調整。
    const canvasW = canvas.width;
    const canvasH = canvas.height;

    // 皮膚基準線：左右2点で管理
    let skinP1 = { x: canvasW * 0.16, y: canvasH * 0.65 };
    let skinP2 = { x: canvasW * 0.84, y: canvasH * 0.65 };

    let draggingMode = null;
    let lastDragPos = null;

    // スマホでつかみやすいように判定範囲を広めにする
    const handleRadius = 16;
    const handleHitRadius = 42;
    const lineHitTolerance = 34;

    // 皮膚基準線付近の検出幅
    const detectionBandHalfWidth = canvasH / 12;

    // 横幅の中央のみを針候補にする。0.70 = 中央70%。誤検出が多ければ 0.60 にする。
    const centerRoiRate = 0.70;

    // スマホ負荷対策。2なら2フレームに1回だけOpenCV処理。
    const processEveryNFrames = 2;

    // 認識する刺入角の範囲。急角度の穿刺も拾えるように75°まで許容。
    const minNeedleAngle = 5;
    const maxNeedleAngle = 75;

    function waitForOpenCV() {
      if (window.cv && cv.Mat) {
        cvReady = true;
        statusText.textContent = "待機中";
        statusText.className = "";
        updateSkinInfo();
      } else {
        setTimeout(waitForOpenCV, 300);
      }
    }
    waitForOpenCV();
    setPauseButtonState(false);

    updateOrientationHint();
    window.addEventListener("resize", updateOrientationHint);
    window.addEventListener("orientationchange", function() {
      setTimeout(updateOrientationHint, 300);
    });

    function updateOrientationHint() {
      const isPortrait = window.innerHeight > window.innerWidth;
      orientationHint.textContent = isPortrait
        ? "縦向きです：カメラ開始または全画面/横向きで横画面ロックを試行します"
        : "横向き表示中：皮膚線ハンドルを指で調整できます";
    }

    function setPauseButtonState(isPaused) {
      pauseBtn.innerHTML = isPaused
        ? '<span class="btnIcon">▶</span><span class="btnText">再開</span>'
        : '<span class="btnIcon">⏸</span><span class="btnText">停止</span>';
      pauseBtn.setAttribute('aria-label', isPaused ? '再開' : '一時停止');
    }

    // ------------------------------
    // Pointer Events：マウス・タッチ・ペンを統一処理
    // ------------------------------
    canvas.addEventListener("pointerdown", function(e) {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      const pos = getCanvasPosition(e);
      startSkinDrag(pos);
    });

    canvas.addEventListener("pointermove", function(e) {
      e.preventDefault();
      const pos = getCanvasPosition(e);

      if (draggingMode) {
        moveSkinDrag(pos);
      } else {
        updateCursor(pos);
      }
    });

    canvas.addEventListener("pointerup", function(e) {
      e.preventDefault();
      endSkinDrag();
    });

    canvas.addEventListener("pointercancel", function(e) {
      e.preventDefault();
      endSkinDrag();
    });

    function startSkinDrag(pos) {
      const d1 = distance(pos, skinP1);
      const d2 = distance(pos, skinP2);
      const dLine = distancePointToSegment(pos, skinP1, skinP2);

      if (d1 <= handleHitRadius) {
        draggingMode = "p1";
      } else if (d2 <= handleHitRadius) {
        draggingMode = "p2";
      } else if (dLine <= lineHitTolerance) {
        draggingMode = "line";
      } else {
        draggingMode = null;
      }

      lastDragPos = pos;
    }

    function moveSkinDrag(pos) {
      if (!draggingMode) return;

      if (draggingMode === "p1") {
        skinP1.y = clamp(pos.y, 25, canvasH - 25);
        skinP1.x = clamp(pos.x, 20, skinP2.x - 80);
      } else if (draggingMode === "p2") {
        skinP2.y = clamp(pos.y, 25, canvasH - 25);
        skinP2.x = clamp(pos.x, skinP1.x + 80, canvasW - 20);
      } else if (draggingMode === "line") {
        const dy = pos.y - lastDragPos.y;
        const dx = pos.x - lastDragPos.x;

        const newP1x = skinP1.x + dx;
        const newP2x = skinP2.x + dx;
        const newP1y = skinP1.y + dy;
        const newP2y = skinP2.y + dy;

        if (newP1x >= 20 && newP2x <= canvasW - 20) {
          skinP1.x = newP1x;
          skinP2.x = newP2x;
        }

        if (newP1y >= 25 && newP1y <= canvasH - 25 && newP2y >= 25 && newP2y <= canvasH - 25) {
          skinP1.y = newP1y;
          skinP2.y = newP2y;
        }
      }

      lastDragPos = pos;
      updateSkinInfo();

      if (paused && reviewIndex >= 0 && frameBuffer.length > 0) {
        showBufferedFrame(reviewIndex);
      }
    }

    function endSkinDrag() {
      draggingMode = null;
      lastDragPos = null;
      canvas.style.cursor = "crosshair";
    }

    function updateCursor(pos) {
      const d1 = distance(pos, skinP1);
      const d2 = distance(pos, skinP2);
      const dLine = distancePointToSegment(pos, skinP1, skinP2);

      if (d1 <= handleHitRadius || d2 <= handleHitRadius) {
        canvas.style.cursor = "grab";
      } else if (dLine <= lineHitTolerance) {
        canvas.style.cursor = "move";
      } else {
        canvas.style.cursor = "crosshair";
      }
    }

    function getCanvasPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function distancePointToSegment(p, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const apx = p.x - a.x;
      const apy = p.y - a.y;
      const ab2 = abx * abx + aby * aby;

      if (ab2 === 0) return distance(p, a);

      let t = (apx * abx + apy * aby) / ab2;
      t = clamp(t, 0, 1);

      const nearest = {
        x: a.x + t * abx,
        y: a.y + t * aby
      };

      return distance(p, nearest);
    }

    function distancePointToInfiniteLine(p, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const numerator = Math.abs(aby * p.x - abx * p.y + b.x * a.y - b.y * a.x);
      const denominator = Math.sqrt(abx * abx + aby * aby);
      if (denominator === 0) return 99999;
      return numerator / denominator;
    }

    function updateSkinInfo() {
      const skinAngle = getLineAngleDeg(skinP1, skinP2);
      skinInfo.textContent = `皮膚基準線：${skinAngle.toFixed(1)}°｜左 ${Math.round(skinP1.x)},${Math.round(skinP1.y)}｜右 ${Math.round(skinP2.x)},${Math.round(skinP2.y)}`;
    }

    // ------------------------------
    // 横画面・全画面制御
    // ------------------------------
    async function requestLandscapeMode() {
      const target = document.getElementById("appShell") || document.documentElement;

      // Android Chromeでは、画面向きロックは全画面中に成功しやすい。
      // カメラ許可ダイアログ後に全画面が解除されることがあるため、複数回呼び出す。
      try {
        if (!document.fullscreenElement && target.requestFullscreen) {
          await target.requestFullscreen({ navigationUI: "hide" });
        }
      } catch (e) {
        console.warn("Fullscreen request failed:", e);
      }

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape");
        }
      } catch (e) {
        console.warn("Landscape lock failed:", e);
      }

      updateOrientationHint();
    }

    function scheduleFullscreenRetry() {
      // 権限許可後やvideo.play後にURLバーが戻る端末向けの再試行。
      // ユーザー操作扱いが残っていれば自動で全画面へ戻る。
      setTimeout(() => requestLandscapeMode(), 150);
      setTimeout(() => requestLandscapeMode(), 600);
      setTimeout(() => requestLandscapeMode(), 1200);
    }

    document.addEventListener("fullscreenchange", function() {
      if (processing && !document.fullscreenElement) {
        scheduleFullscreenRetry();
      }
    });

    // ------------------------------
    // カメラ制御
    // ------------------------------
    async function startCamera() {
      if (!cvReady) {
        alert("OpenCV.jsの読み込み中です。数秒待ってから再度押してください。");
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("このブラウザではカメラを使用できません。iPhoneはSafari、AndroidはChromeでHTTPS接続を使用してください。");
        return;
      }

      if (processing) return;

      await requestLandscapeMode();

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 30 }
          },
          audio: false
        });

        video.srcObject = stream;

        // カメラ許可後に全画面が解除される端末があるため、再度全画面化を試行。
        await requestLandscapeMode();

        await video.play();

        // 再生開始直後にもURLバーが戻ることがあるため追加で再試行。
        scheduleFullscreenRetry();

        frameBuffer = [];
        reviewIndex = -1;
        frameCount = 0;
        lastBestLine = null;
        lastAngleValue = null;
        lastStatusValue = "";
        lastStatusClassValue = "";

        processing = true;
        paused = false;

        setPauseButtonState(false);
        frameSlider.disabled = true;
        frameSlider.min = 0;
        frameSlider.max = 0;
        frameSlider.value = 0;

        angleText.textContent = "--.-°";
        updateReachDisplay(null);
        statusText.textContent = "測定中";
        statusText.className = "";

        updateFrameInfo();
        updateSkinInfo();
        processFrame();

      } catch (err) {
        alert("カメラを起動できませんでした。ブラウザのカメラ許可、HTTPS接続、背面カメラの使用可否を確認してください。\n\n詳細: " + err.message);
      }
    }

    function stopCamera() {
      processing = false;
      paused = false;
      draggingMode = null;

      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0, 0, canvasW, canvasH);

      frameBuffer = [];
      reviewIndex = -1;
      lastBestLine = null;
      lastAngleValue = null;

      angleText.textContent = "--.-°";
      updateReachDisplay(null);
      statusText.textContent = "停止中";
      statusText.className = "";
      setPauseButtonState(false);

      frameSlider.disabled = true;
      frameSlider.min = 0;
      frameSlider.max = 0;
      frameSlider.value = 0;

      updateFrameInfo();
      updateSkinInfo();
    }

    function togglePause() {
      if (!processing) return;

      paused = !paused;

      if (paused) {
        setPauseButtonState(true);
        reviewIndex = frameBuffer.length - 1;
        setupSliderForReview();

        if (reviewIndex >= 0) {
          frameSlider.value = reviewIndex;
          showBufferedFrame(reviewIndex);
        }
      } else {
        setPauseButtonState(false);
        statusText.textContent = "測定中";
        statusText.className = "";
        reviewIndex = -1;
        frameSlider.disabled = true;
        processFrame();
      }
    }

    function setupSliderForReview() {
      if (frameBuffer.length <= 0) {
        frameSlider.disabled = true;
        frameSlider.min = 0;
        frameSlider.max = 0;
        frameSlider.value = 0;
        return;
      }

      frameSlider.disabled = false;
      frameSlider.min = 0;
      frameSlider.max = frameBuffer.length - 1;
      frameSlider.step = 1;
      frameSlider.value = frameBuffer.length - 1;
    }

    function onSliderMove() {
      if (!paused) return;
      const index = Number(frameSlider.value);
      reviewIndex = index;
      showBufferedFrame(index);
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await requestLandscapeMode();
          scheduleFullscreenRetry();
        } else {
          await document.exitFullscreen();
        }
      } catch (e) {
        alert("このブラウザでは全画面表示にできませんでした。端末を横向きにしてから再度試してください。");
      }
    }


    function drawCameraFrame() {
      ctx.save();
      ctx.clearRect(0, 0, canvasW, canvasH);

      if (mirrorFix) {
        ctx.translate(canvasW, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvasW, canvasH);
      } else {
        ctx.drawImage(video, 0, 0, canvasW, canvasH);
      }

      ctx.restore();
    }

    // ------------------------------
    // メイン画像処理
    // ------------------------------
    function processFrame() {
      if (!processing || paused) return;

      frameCount++;
      drawCameraFrame();

      if (frameCount % processEveryNFrames !== 0) {
        drawOverlays(lastBestLine, lastAngleValue, lastStatusValue, lastStatusClassValue);
        saveCurrentFrame(lastAngleValue, lastStatusValue, lastStatusClassValue);
        animationId = requestAnimationFrame(processFrame);
        return;
      }

      let srcFull = cv.imread(canvas);
      let gray = new cv.Mat();
      let blur = new cv.Mat();
      let edges = new cv.Mat();
      let lines = new cv.Mat();

      let bestLine = null;
      let angleValue = null;
      let statusValue = "";
      let statusClassValue = "";

      try {
        cv.cvtColor(srcFull, gray, cv.COLOR_RGBA2GRAY);
        cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
        cv.Canny(blur, edges, 55, 155);

        cv.HoughLinesP(
          edges,
          lines,
          1,
          Math.PI / 180,
          45,
          45,
          12
        );

        let bestScore = 0;
        const roi = getCenterRoi();

        for (let i = 0; i < lines.rows; i++) {
          const x1 = lines.data32S[i * 4];
          const y1 = lines.data32S[i * 4 + 1];
          const x2 = lines.data32S[i * 4 + 2];
          const y2 = lines.data32S[i * 4 + 3];

          const dx = x2 - x1;
          const dy = y2 - y1;
          const length = Math.sqrt(dx * dx + dy * dy);
          if (length < 45) continue;

          const mid = {
            x: (x1 + x2) / 2,
            y: (y1 + y2) / 2
          };

          // スマホ撮影では腕や背景を拾いやすいため、中央横幅に限定
          if (mid.x < roi.left || mid.x > roi.right) continue;

          // 皮膚基準線付近の帯状範囲だけを候補にする
          const distToSkin = distancePointToInfiniteLine(mid, skinP1, skinP2);
          if (distToSkin > detectionBandHalfWidth) continue;

          const candidateLine = { x1, y1, x2, y2 };
          const insertionAngle = calcInsertionAngle(candidateLine);

          // 穿刺角として現実的な候補範囲。急角度の穿刺も75°まで認識する。
          if (insertionAngle < minNeedleAngle || insertionAngle > maxNeedleAngle) continue;

          // 長さを主評価、皮膚基準線に近いものを副評価
          const score = length - distToSkin * 0.7;

          if (score > bestScore) {
            bestScore = score;
            bestLine = {
              x1,
              y1,
              x2,
              y2,
              angle: insertionAngle,
              length,
              distToSkin
            };
          }
        }

        if (bestLine) {
          angleValue = calcInsertionAngle(bestLine);
          const judge = getJudgeResult(angleValue);
          statusValue = judge.text;
          statusClassValue = judge.className;
        } else {
          angleValue = null;
          statusValue = "皮膚基準線付近で針を検出できません";
          statusClassValue = "warn";
        }

        lastBestLine = bestLine;
        lastAngleValue = angleValue;
        lastStatusValue = statusValue;
        lastStatusClassValue = statusClassValue;

        drawCameraFrame();
        drawOverlays(bestLine, angleValue, statusValue, statusClassValue);
        saveCurrentFrame(angleValue, statusValue, statusClassValue);

      } catch (e) {
        console.error(e);
      } finally {
        srcFull.delete();
        gray.delete();
        blur.delete();
        edges.delete();
        lines.delete();
      }

      animationId = requestAnimationFrame(processFrame);
    }


    function getDepthMm() {
      const value = Number(depthInput.value);
      if (!Number.isFinite(value) || value <= 0) return null;
      return value;
    }

    function calcReachDistanceMm(depthMm, angleDeg) {
      if (!Number.isFinite(depthMm) || depthMm <= 0) return null;
      if (!Number.isFinite(angleDeg) || angleDeg <= 0) return null;

      const rad = angleDeg * Math.PI / 180;
      const sinValue = Math.sin(rad);
      if (sinValue <= 0.001) return null;

      return depthMm / sinValue;
    }

    function formatReachText(angleDeg) {
      const depthMm = getDepthMm();

      if (depthMm === null) {
        return "推定到達距離：深さを入力してください";
      }

      if (!Number.isFinite(angleDeg) || angleDeg <= 0) {
        return `推定到達距離：--.- mm｜深さ ${depthMm.toFixed(1)} mm`;
      }

      const reachMm = calcReachDistanceMm(depthMm, angleDeg);
      if (reachMm === null) {
        return `推定到達距離：計算不可｜深さ ${depthMm.toFixed(1)} mm`;
      }

      return `推定到達距離：約 ${reachMm.toFixed(1)} mm｜深さ ${depthMm.toFixed(1)} mm`;
    }

    function updateReachDisplay(angleDeg) {
      const text = formatReachText(angleDeg);
      reachInfo.textContent = text;
      reachPreview.textContent = text;
    }

    function drawOverlays(bestLine, angleValue, statusValue, statusClassValue) {
      drawDetectionRoi();
      drawSkinReferenceLine();

      if (bestLine && angleValue !== null) {
        drawNeedleLine(bestLine);
        angleText.textContent = angleValue.toFixed(1) + "°";
        updateReachDisplay(angleValue);
        drawAngleTextOnCanvas(angleValue, bestLine);
        statusText.textContent = statusValue;
        statusText.className = statusClassValue;
      } else {
        angleText.textContent = "--.-°";
        updateReachDisplay(null);
        statusText.textContent = statusValue || "皮膚基準線付近で針を検出できません";
        statusText.className = statusClassValue || "warn";
      }
    }

    function saveCurrentFrame(angleValue, statusValue, statusClassValue) {
      if (!processing) return;

      const imageData = ctx.getImageData(0, 0, canvasW, canvasH);
      frameBuffer.push({
        imageData,
        angle: angleValue,
        status: statusValue,
        statusClass: statusClassValue,
        timestamp: new Date()
      });

      if (frameBuffer.length > maxBufferFrames) {
        frameBuffer.shift();
      }

      updateFrameInfo();
    }

    function showBufferedFrame(index) {
      if (index < 0 || index >= frameBuffer.length) return;

      const frame = frameBuffer[index];
      ctx.putImageData(frame.imageData, 0, 0);

      if (frame.angle !== null) {
        angleText.textContent = frame.angle.toFixed(1) + "°";
        updateReachDisplay(frame.angle);
      } else {
        angleText.textContent = "--.-°";
        updateReachDisplay(null);
      }

      statusText.textContent = (frame.status || "確認中") + "｜静止画確認中";
      statusText.className = frame.statusClass || "paused";

      reviewIndex = index;
      frameSlider.value = index;

      updateFrameInfo();
      updateSkinInfo();
    }

    function updateFrameInfo() {
      if (paused && reviewIndex >= 0 && frameBuffer.length > 0) {
        frameInfo.textContent = `保存フレーム：${frameBuffer.length} / ${maxBufferFrames}｜表示中：${reviewIndex + 1} / ${frameBuffer.length}`;
      } else {
        frameInfo.textContent = `保存フレーム：${frameBuffer.length} / ${maxBufferFrames}`;
      }
    }

    // ------------------------------
    // 角度計算
    // ------------------------------
    function getLineAngleDegFromCoords(x1, y1, x2, y2) {
      return Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
    }

    function getLineAngleDeg(p1, p2) {
      return getLineAngleDegFromCoords(p1.x, p1.y, p2.x, p2.y);
    }

    function normalizeAngle180(angle) {
      while (angle > 180) angle -= 360;
      while (angle < -180) angle += 360;
      return angle;
    }

    function calcInsertionAngle(line) {
      const needleAngle = getLineAngleDegFromCoords(line.x1, line.y1, line.x2, line.y2);
      const skinAngle = getLineAngleDeg(skinP1, skinP2);

      let diff = Math.abs(normalizeAngle180(needleAngle - skinAngle));
      if (diff > 90) diff = 180 - diff;
      return diff;
    }

    // ------------------------------
    // 描画
    // ------------------------------
    function getCenterRoi() {
      const width = canvasW * centerRoiRate;
      const left = (canvasW - width) / 2;
      const right = left + width;
      return { left, right };
    }

    function drawDetectionRoi() {
      const roi = getCenterRoi();

      ctx.save();
      ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
      ctx.fillRect(roi.left, 0, roi.right - roi.left, canvasH);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(roi.left, 0);
      ctx.lineTo(roi.left, canvasH);
      ctx.moveTo(roi.right, 0);
      ctx.lineTo(roi.right, canvasH);
      ctx.stroke();
      ctx.restore();
    }

    function drawSkinReferenceLine() {
      ctx.save();
      const extended = getExtendedSkinLinePoints();

      ctx.lineWidth = 3;
      ctx.strokeStyle = "lime";
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(extended.x1, extended.y1);
      ctx.lineTo(extended.x2, extended.y2);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.lineWidth = 6;
      ctx.strokeStyle = "lime";
      ctx.beginPath();
      ctx.moveTo(skinP1.x, skinP1.y);
      ctx.lineTo(skinP2.x, skinP2.y);
      ctx.stroke();

      drawHandle(skinP1.x, skinP1.y, "L");
      drawHandle(skinP2.x, skinP2.y, "R");


      ctx.restore();
    }

    function getExtendedSkinLinePoints() {
      const dx = skinP2.x - skinP1.x;
      const dy = skinP2.y - skinP1.y;

      if (Math.abs(dx) < 1) {
        return { x1: skinP1.x, y1: 0, x2: skinP1.x, y2: canvasH };
      }

      const slope = dy / dx;
      const yAtLeft = skinP1.y + slope * (0 - skinP1.x);
      const yAtRight = skinP1.y + slope * (canvasW - skinP1.x);

      return { x1: 0, y1: yAtLeft, x2: canvasW, y2: yAtRight };
    }

    function drawHandle(x, y, label) {
      ctx.save();
      ctx.fillStyle = "lime";
      ctx.beginPath();
      ctx.arc(x, y, handleRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "black";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.fillStyle = "black";
      ctx.font = "bold 16px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x, y);
      ctx.restore();
    }

    function drawNeedleLine(line) {
      ctx.save();
      ctx.lineWidth = 7;
      ctx.strokeStyle = "red";
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(line.x1, line.y1);
      ctx.lineTo(line.x2, line.y2);
      ctx.stroke();
      ctx.restore();
    }

    function drawAngleTextOnCanvas(angle, line = null) {
      ctx.save();

      const depthMm = getDepthMm();
      const reachMm = depthMm === null ? null : calcReachDistanceMm(depthMm, angle);
      const label = `${angle.toFixed(1)}°`;
      const subLabel = reachMm === null ? null : `到達 ${reachMm.toFixed(1)}mm`;
      const boxWidth = subLabel ? 172 : 132;
      const boxHeight = subLabel ? 72 : 54;

      let center = { x: canvasW * 0.50, y: canvasH * 0.28 };
      let pointer = null;

      if (line) {
        const hit = getLineIntersection(
          { x1: line.x1, y1: line.y1, x2: line.x2, y2: line.y2 },
          { x1: skinP1.x, y1: skinP1.y, x2: skinP2.x, y2: skinP2.y }
        );

        if (hit && hit.x >= -canvasW && hit.x <= canvasW * 2 && hit.y >= -canvasH && hit.y <= canvasH * 2) {
          pointer = hit;
        } else {
          pointer = {
            x: (line.x1 + line.x2) / 2,
            y: (line.y1 + line.y2) / 2
          };
        }

        const skinUnit = getUnitVector(skinP1.x, skinP1.y, skinP2.x, skinP2.y);
        let needleUnit = getUnitVector(line.x1, line.y1, line.x2, line.y2);

        // 鋭角側をそろえたうえで、鈍角側の二等分線方向を候補にする
        if (dot(skinUnit, needleUnit) < 0) {
          needleUnit = { x: -needleUnit.x, y: -needleUnit.y };
        }

        let obtuseDir = normalizeVector({
          x: skinUnit.x - needleUnit.x,
          y: skinUnit.y - needleUnit.y
        });

        if (!isFinite(obtuseDir.x) || !isFinite(obtuseDir.y)) {
          obtuseDir = { x: -needleUnit.y, y: needleUnit.x };
        }

        // 「斜め上」を優先。候補が下向きなら反転する。
        if (obtuseDir.y > 0) {
          obtuseDir = { x: -obtuseDir.x, y: -obtuseDir.y };
        }

        center = {
          x: pointer.x + obtuseDir.x * 96,
          y: pointer.y + obtuseDir.y * 76
        };

        center.x = clamp(center.x, boxWidth / 2 + 8, canvasW - boxWidth / 2 - 8);
        center.y = clamp(center.y, boxHeight / 2 + 92, canvasH - boxHeight / 2 - 18);
      }

      const x = center.x - boxWidth / 2;
      const y = center.y - boxHeight / 2;

      if (pointer) {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.85)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(pointer.x, pointer.y);
        ctx.lineTo(center.x, center.y + boxHeight / 2);
        ctx.stroke();
      }

      ctx.fillStyle = "rgba(0, 0, 0, 0.76)";
      roundRect(ctx, x, y, boxWidth, boxHeight, 12, true, false);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, boxWidth, boxHeight, 12, false, true);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      if (subLabel) {
        ctx.font = "bold 30px sans-serif";
        ctx.fillText(label, center.x, center.y - 12);
        ctx.font = "bold 18px sans-serif";
        ctx.fillText(subLabel, center.x, center.y + 20);
      } else {
        ctx.font = "bold 34px sans-serif";
        ctx.fillText(label, center.x, center.y);
      }

      ctx.restore();
    }

    function getLineIntersection(a, b) {
      const x1 = a.x1, y1 = a.y1, x2 = a.x2, y2 = a.y2;
      const x3 = b.x1, y3 = b.y1, x4 = b.x2, y4 = b.y2;
      const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
      if (Math.abs(den) < 0.0001) return null;
      return {
        x: ((x1 * y2 - y1 * x2) * (x3 - x4) - (x1 - x2) * (x3 * y4 - y3 * x4)) / den,
        y: ((x1 * y2 - y1 * x2) * (y3 - y4) - (y1 - y2) * (x3 * y4 - y3 * x4)) / den
      };
    }

    function getUnitVector(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      return { x: dx / len, y: dy / len };
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y;
    }

    function normalizeVector(v) {
      const len = Math.sqrt(v.x * v.x + v.y * v.y);
      if (len < 0.0001) return { x: 0, y: -1 };
      return { x: v.x / len, y: v.y / len };
    }

    function roundRect(context, x, y, width, height, radius, fill, stroke) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
      if (fill) context.fill();
      if (stroke) context.stroke();
    }

    function getJudgeResult(angle) {
      const target = 25;
      const tolerance = 3;
      const diff = angle - target;

      if (Math.abs(diff) <= tolerance) {
        return {
          text: `適正範囲（25±3°）｜差 ${diff.toFixed(1)}°`,
          className: "ok"
        };
      }

      if (diff < -tolerance) {
        return {
          text: `浅い：+${Math.abs(diff).toFixed(1)}° 角度を立てる`,
          className: "warn"
        };
      }

      return {
        text: `深い：-${Math.abs(diff).toFixed(1)}° 角度を寝かせる`,
        className: "warn"
      };
    }

    updateSkinInfo();
    updateReachDisplay(null);
  </script>
</body>
</html>
